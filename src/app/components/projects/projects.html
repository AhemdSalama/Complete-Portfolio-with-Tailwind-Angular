<section id="projects" class="relative bg-white py-24">
  <div class="absolute top-0 left-0 w-full overflow-hidden leading-none z-10 -mt-[1px]">
    <svg
      class="relative block w-full h-[60px] md:h-[100px]"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 1200 120"
      preserveAspectRatio="none"
    >
      <path d="M1200 0L0 0 0 16.48 1200 120z" class="fill-slate-950"></path>
    </svg>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 pt-16">
    <div class="text-center max-w-3xl mx-auto mb-16">
      <h2 class="text-4xl font-extrabold text-gray-900 tracking-tight mb-4">Featured Projects</h2>
      <p class="text-lg text-gray-500 font-medium">
        A collection of my recent work in web development, AI, and automation.
      </p>
    </div>

    <div class="flex flex-wrap justify-center gap-4 mb-16">
      <button
        *ngFor="let filter of filters"
        (click)="setFilter(filter)"
        [class.bg-gray-900]="activeFilter === filter"
        [class.text-white]="activeFilter === filter"
        [class.bg-slate-100]="activeFilter !== filter"
        [class.text-gray-600]="activeFilter !== filter"
        class="px-6 py-2.5 rounded-full font-semibold text-sm transition-all duration-300 hover:bg-gray-800 hover:text-white hover:shadow-md"
      >
        {{ filter }}
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div
        *ngFor="let p of filteredProjects"
        class="bg-white rounded-2xl border border-slate-200 shadow-md hover:shadow-2xl hover:shadow-blue-900/10 hover:border-blue-200 transition-all duration-500 group flex flex-col h-full overflow-hidden hover:-translate-y-2"
      >
        <div class="relative w-full h-56 overflow-hidden bg-slate-100 border-b border-slate-100">
          <span
            class="absolute top-4 left-4 z-10 px-3 py-1 bg-white/95 backdrop-blur-md rounded-full text-xs font-extrabold text-gray-900 shadow-sm border border-slate-200/50"
          >
            {{ p.category }}
          </span>
          <img
            [src]="p.image"
            [alt]="p.title"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
          />
        </div>

        <div class="p-6 flex flex-col flex-grow">
          <h3
            class="text-xl font-bold text-gray-900 mb-3 group-hover:text-blue-700 transition-colors"
          >
            {{ p.title }}
          </h3>
          <p class="text-sm text-gray-500 mb-6 leading-relaxed flex-grow">{{ p.description }}</p>

          <div class="flex flex-wrap gap-2.5 mb-8">
            <span
              *ngFor="let tag of p.tags"
              class="px-3 py-1.5 bg-gradient-to-b from-slate-50 to-slate-100 border border-slate-200 text-slate-700 rounded-lg text-xs font-bold shadow-sm group-hover:border-blue-200 group-hover:text-blue-700 transition-colors"
            >
              {{ tag }}
            </span>
          </div>

          <div class="flex items-center justify-between pt-5 border-t border-slate-100 mt-auto">
            <div class="flex items-center gap-2">
              <a
                [href]="p.githubLink"
                target="_blank"
                class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-700 bg-slate-100 hover:bg-slate-200 hover:text-black transition-colors"
                title="View Source Code"
              >
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                  <path
                    d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
                  />
                </svg>
                GitHub
              </a>
              <a
                [href]="p.demoLink"
                target="_blank"
                class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-blue-700 bg-blue-50 hover:bg-blue-100 hover:text-blue-800 transition-colors"
                title="View Live Demo"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
                  ></path>
                </svg>
                Demo
              </a>
            </div>

            <a
              [routerLink]="['/project', p.id]"
              class="flex items-center gap-1.5 text-sm font-bold text-gray-900 group-hover:text-blue-600 transition-colors cursor-pointer"
            >
              Details
              <svg
                class="w-4 h-4 transition-transform group-hover:translate-x-1"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M14 5l7 7m0 0l-7 7m7-7H3"
                ></path>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
    <div *ngIf="projects.length > 6" class="mt-16 text-center">
      <a
        routerLink="/all-projects"
        class="inline-flex items-center gap-2 px-8 py-4 rounded-full bg-gray-900 text-white font-bold hover:bg-blue-600 transition-all duration-300 shadow-lg hover:shadow-xl hover:-translate-y-1"
      >
        View All Projects
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M14 5l7 7m0 0l-7 7m7-7H3"
          ></path>
        </svg>
      </a>
    </div>
  </div>
</section>
