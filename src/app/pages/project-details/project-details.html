<div *ngIf="project" class="min-h-screen bg-slate-50 pt-24 pb-16">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <a
      [routerLink]="['/']"
      fragment="projects"
      class="inline-flex items-center gap-2 text-sm font-semibold text-gray-500 hover:text-blue-600 mb-8 transition-colors"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        ></path>
      </svg>
      Back to Projects
    </a>

    <div class="w-full h-[400px] rounded-3xl overflow-hidden shadow-2xl mb-12 relative group">
      <img [src]="project.image" [alt]="project.title" class="w-full h-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-t from-gray-900/80 to-transparent"></div>

      <div class="absolute bottom-0 left-0 p-8 md:p-12 w-full">
        <span
          class="px-4 py-1.5 bg-blue-600 text-white rounded-full text-xs font-bold uppercase tracking-wider mb-4 inline-block shadow-lg"
        >
          {{ project.category }}
        </span>
        <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-2 tracking-tight">
          {{ project.title }}
        </h1>
        <p class="text-xl text-gray-300 font-medium max-w-2xl">{{ project.shortDesc }}</p>
      </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-12">
      <div class="lg:w-2/3 space-y-10">
        <section>
          <h2 class="text-2xl font-bold text-gray-900 mb-4 flex items-center gap-2">
            <svg
              class="w-6 h-6 text-blue-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              ></path>
            </svg>
            Project Overview
          </h2>
          <p class="text-lg text-gray-600 leading-relaxed">
            {{ project.overview }}
          </p>
        </section>

        <section>
          <h2 class="text-2xl font-bold text-gray-900 mb-4 flex items-center gap-2">
            <svg
              class="w-6 h-6 text-purple-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              ></path>
            </svg>
            Key Features
          </h2>
          <ul class="space-y-3">
            <li *ngFor="let feature of project.features" class="flex items-start">
              <span class="w-2 h-2 mt-2 mr-3 bg-purple-500 rounded-full shrink-0"></span>
              <span class="text-lg text-gray-600">{{ feature }}</span>
            </li>
          </ul>
        </section>

        <section>
          <h2 class="text-2xl font-bold text-gray-900 mb-4 flex items-center gap-2">
            <svg
              class="w-6 h-6 text-emerald-500"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"
              ></path>
            </svg>
            Challenges & Solutions
          </h2>
          <div class="p-6 bg-emerald-50 border border-emerald-100 rounded-2xl">
            <p class="text-lg text-emerald-900 leading-relaxed">
              {{ project.challenges }}
            </p>
          </div>
        </section>
      </div>

      <div class="lg:w-1/3">
        <div class="sticky top-28 space-y-8">
          <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100">
            <h3 class="text-lg font-bold text-gray-900 mb-4">Project Links</h3>
            <div class="space-y-3">
              <a
                [href]="project.demoLink"
                target="_blank"
                class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-colors"
              >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
                  ></path>
                </svg>
                Live Demo
              </a>
              <a
                [href]="project.githubLink"
                target="_blank"
                class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-slate-100 text-slate-800 rounded-xl font-bold hover:bg-slate-200 transition-colors"
              >
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                  <path
                    d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
                  />
                </svg>
                GitHub Repository
              </a>
            </div>
          </div>

          <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100">
            <h3 class="text-lg font-bold text-gray-900 mb-4">Technologies Used</h3>
            <div class="flex flex-wrap gap-2">
              <span
                *ngFor="let tag of project.tags"
                class="px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-lg text-sm font-bold shadow-sm"
              >
                {{ tag }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
