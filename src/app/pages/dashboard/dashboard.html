<div dir="ltr" class="flex h-screen bg-slate-50 overflow-hidden font-sans">
  <aside
    class="w-64 bg-slate-900 text-white flex flex-col transition-all duration-300 shadow-2xl z-20"
  >
    <div class="h-20 flex items-center px-8 border-b border-slate-800">
      <div
        class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center mr-3 font-bold text-xl"
      >
        A
      </div>
      <span class="text-xl font-extrabold tracking-wider"
        >Admin<span class="text-blue-500">Panel</span></span
      >
    </div>

    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2 custom-scrollbar">
      @for (item of menuItems; track item.name) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-blue-600 text-white shadow-lg shadow-blue-600/20"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
          class="flex items-center px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl transition-all duration-200 group"
        >
          <svg
            class="w-5 h-5 mr-3 transition-colors duration-200"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              [attr.d]="item.icon"
            ></path>
          </svg>
          <span class="font-medium">{{ item.name }}</span>
        </a>
      }
    </nav>

    <div class="p-4 border-t border-slate-800 space-y-2">
      <a
        routerLink="/"
        target="_blank"
        class="flex items-center justify-center w-full px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-xl transition-colors font-medium text-sm"
      >
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
          ></path>
        </svg>
        View Live Site
      </a>
      <button
        (click)="logout()"
        class="flex items-center justify-center w-full px-4 py-2.5 bg-red-500/10 hover:bg-red-500 hover:text-white text-red-500 rounded-xl transition-colors font-medium text-sm"
      >
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
          ></path>
        </svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden relative">
    <header
      class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-8 z-10 sticky top-0"
    >
      <h2 class="text-2xl font-bold text-slate-800">Dashboard</h2>

      <div class="flex items-center gap-4">
        <div class="text-right hidden md:block">
          <p class="text-sm font-bold text-slate-900">Ahmed Salama</p>
          <p class="text-xs text-slate-500 font-medium">Super Admin</p>
        </div>
        <div
          class="w-10 h-10 rounded-full bg-blue-100 border-2 border-blue-600 flex items-center justify-center overflow-hidden"
        >
          <span class="text-blue-600 font-bold">AS</span>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto p-8 custom-scrollbar">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
