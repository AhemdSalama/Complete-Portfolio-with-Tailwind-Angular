<div class="min-h-screen bg-slate-50 flex">
  
  <aside class="w-64 bg-gray-950 text-white min-h-screen p-6 hidden md:block">
    <div class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-10">
      Admin Panel
    </div>
    <nav class="space-y-2">
      <a href="#" class="block py-3 px-4 rounded-lg bg-blue-600/10 text-blue-400 font-medium border border-blue-500/20">
        Hero Section
      </a>
      <a href="#" class="block py-3 px-4 rounded-lg text-gray-400 hover:bg-gray-900 hover:text-white transition-colors">
        Projects
      </a>
      <a href="#" class="block py-3 px-4 rounded-lg text-gray-400 hover:bg-gray-900 hover:text-white transition-colors">
        Messages
      </a>
    </nav>
  </aside>

  <main class="flex-1 p-8 md:p-12">
    <div class="max-w-3xl mx-auto">
      
      <header class="mb-10">
        <h1 class="text-3xl font-bold text-gray-900">Edit Hero Section</h1>
        <p class="text-gray-500 mt-2">Manage the main content of your landing page.</p>
      </header>

      <form [formGroup]="heroForm" (ngSubmit)="onSubmit()" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-2">Main Headline</label>
          <input 
            type="text" 
            formControlName="headline"
            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
            placeholder="e.g. Web Developer...">
        </div>

        <div class="mb-8">
          <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
          <textarea 
            formControlName="description"
            rows="4"
            class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-none"
            placeholder="Write a short bio..."></textarea>
        </div>

        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-lg border border-slate-100 mb-8">
          <div>
            <h4 class="text-sm font-medium text-gray-900">Available for Opportunities</h4>
            <p class="text-xs text-gray-500">Turn this on to show the availability badge on your site.</p>
          </div>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" formControlName="isAvailable" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
          </label>
        </div>

        <div class="flex justify-end">
          <button 
            type="submit" 
            [disabled]="heroForm.invalid || isSaving"
            class="px-8 py-3 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
            
            <svg *ngIf="isSaving" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            
            {{ isSaving ? 'Saving...' : 'Save Changes' }}
          </button>
        </div>

      </form>
    </div>
  </main>
</div>
