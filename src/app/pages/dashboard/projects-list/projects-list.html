<div class="space-y-6">
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">My Projects</h1>
      <p class="text-slate-500 text-sm">Manage all your portfolio works from here.</p>
    </div>
    <button routerLink="new" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg shadow-blue-600/20 flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      Add New Project
    </button>
  </div>

  <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
    <table class="w-full text-left border-collapse">
      <thead class="bg-slate-50 border-b border-slate-200">
        <tr>
          <th class="px-6 py-4 text-slate-600 font-bold text-sm uppercase tracking-wider">Project</th>
          <th class="px-6 py-4 text-slate-600 font-bold text-sm uppercase tracking-wider">Category</th>
          <th class="px-6 py-4 text-slate-600 font-bold text-sm uppercase tracking-wider">Date</th>
          <th class="px-6 py-4 text-slate-600 font-bold text-sm uppercase tracking-wider text-center">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100">
        @for (project of projects; track project._id) {
          <tr class="hover:bg-slate-50/50 transition-colors group">
            <td class="px-6 py-4">
              <div class="flex items-center gap-4">
                <img [src]="project.thumbnailUrl" class="w-12 h-12 rounded-lg object-cover border border-slate-200 shadow-sm" alt="">
                <div>
                  <p class="font-bold text-slate-900">{{ project.title_en }}</p>
                  <p class="text-xs text-slate-400 font-medium italic">{{ project.slug }}</p>
                </div>
              </div>
            </td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold uppercase">{{ project.category }}</span>
            </td>
            <td class="px-6 py-4 text-sm text-slate-500 font-medium">
              {{ project.createdAt | date:'mediumDate' }}
            </td>
            <td class="px-6 py-4">
              <div class="flex justify-center gap-2">
                <button [routerLink]="['edit', project._id]" class="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                </button>
                <button (click)="deleteProject(project._id)" class="p-2 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
